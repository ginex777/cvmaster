<main id="main" class="billing-page" tabindex="-1" aria-labelledby="billing-title">
  <div class="page-header">
    <a routerLink="/app/settings" class="page-back">
      <lucide-icon name="chevron-left" [size]="14" aria-hidden="true"></lucide-icon>
      Einstellungen
    </a>
    <div class="page-header__text">
      <h1 id="billing-title" class="page-title">Abrechnung</h1>
      <p class="page-sub">Plan, Zahlungsmethode und Rechnungen</p>
    </div>
  </div>

  <section class="settings-grid">
    <article class="settings-panel" aria-labelledby="plan-heading">
      <h2 id="plan-heading">Aktiver Plan</h2>
      <p class="settings-panel__metric">{{ planLabel(auth.user()?.plan) }}</p>
      <p>Planwechsel, Rechnungen und Kündigung laufen über Paddle.</p>
      <div class="settings-panel__actions">
        <a routerLink="/preise" class="btn btn--outline btn--md">Plan wechseln</a>
        @if (customerPortalUrl) {
          <a [href]="customerPortalUrl" class="btn btn--ghost btn--md" rel="noopener">Paddle Portal</a>
        }
      </div>
    </article>
  </section>
</main>
