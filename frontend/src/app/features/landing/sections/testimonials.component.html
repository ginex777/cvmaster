<section class="section-shell" aria-labelledby="testimonials-heading">
  <div class="section-head">
    <p class="eyebrow">● STIMMEN</p>
    <h2 id="testimonials-heading">Was Studenten und Junior-Devs sagen.</h2>
  </div>

  <div class="testimonials">
    @for (t of testimonials; track t.name; let i = $index) {
      <article class="testimonial-card" [lbaReveal]="i * 100">
        <div class="testimonial-card__quote-icon" aria-hidden="true">
          <lucide-icon name="quote" [size]="20"></lucide-icon>
        </div>
        <p class="testimonial-quote">{{ t.quote }}</p>
        <footer>
          <span
            class="avatar"
            [style.background]="avatarBg(t.name)"
            [style.color]="avatarColor(t.name)"
            aria-hidden="true">{{ initials(t.name) }}</span>
          <div>
            <strong>{{ t.name }}</strong>
            <small>{{ t.role }}</small>
          </div>
        </footer>
      </article>
    }
  </div>
</section>
