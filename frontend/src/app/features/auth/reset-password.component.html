<main id="main" class="auth-page" tabindex="-1">
  <div class="auth-card" aria-labelledby="reset-heading">
    <h1 id="reset-heading">Neues Passwort setzen</h1>

    @if (error()) {
      <div role="alert" aria-live="polite" class="auth-card__error">{{ error() }}</div>
    }

    @if (tokenMissing) {
      <div role="alert" class="auth-card__error">
        Kein gültiger Reset-Link. Bitte fordere einen neuen an.
      </div>
      <a routerLink="/forgot-password" class="btn btn--primary btn--full">Neuen Link anfordern</a>
    } @else {
      <form [formGroup]="form" (ngSubmit)="submit()" novalidate aria-label="Neues Passwort setzen">
        <div class="field">
          <label for="new-password">Neues Passwort</label>
          <input
            id="new-password"
            type="password"
            formControlName="newPassword"
            autocomplete="new-password"
            aria-required="true"
            [attr.aria-describedby]="form.controls.newPassword.invalid && form.controls.newPassword.touched ? 'new-password-error' : null" />
          @if (form.controls.newPassword.invalid && form.controls.newPassword.touched) {
            <span id="new-password-error" role="alert" class="field__error">Mindestens 12 Zeichen erforderlich.</span>
          }
        </div>

        <div class="field">
          <label for="confirm-password">Passwort bestätigen</label>
          <input
            id="confirm-password"
            type="password"
            formControlName="confirmPassword"
            autocomplete="new-password"
            aria-required="true" />
        </div>

        <button type="submit" class="btn btn--primary btn--full" [disabled]="loading()">
          @if (loading()) { Wird gespeichert… } @else { Passwort speichern }
        </button>
      </form>
    }

    <p class="auth-card__foot">
      <a routerLink="/login">Zurück zum Login</a>
    </p>
  </div>
</main>
