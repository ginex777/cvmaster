<div class="picker" (click)="$event.stopPropagation()">
  <button
    type="button"
    class="picker__trigger"
    [attr.aria-expanded]="dropdownOpen()"
    aria-haspopup="listbox"
    aria-label="CV-Template auswählen: {{ currentLabel }}"
    (click)="toggleDropdown()">
    <span class="picker__thumb" aria-hidden="true">
      @switch (template()) {
        @case ('classic')   { <lba-cv-mini-preview-classic /> }
        @case ('modern')    { <lba-cv-mini-preview-modern /> }
        @case ('editorial') { <lba-cv-mini-preview-editorial /> }
        @case ('minimal')   { <lba-cv-mini-preview-minimal /> }
        @case ('executive') { <lba-cv-mini-preview-executive /> }
      }
    </span>
    <span class="picker__current-name">{{ currentLabel }}</span>
    <lucide-icon name="chevron-down" [size]="14" aria-hidden="true" class="picker__chevron"></lucide-icon>
  </button>

  @if (dropdownOpen()) {
    <div class="picker__dropdown" role="listbox" aria-label="Template auswählen">
      @for (option of options; track option.value) {
        <button
          type="button"
          role="option"
          class="picker__card"
          [class.picker__card--active]="template() === option.value"
          [attr.aria-selected]="template() === option.value"
          [attr.aria-label]="option.label"
          (click)="select(option.value)">
          @if (template() === option.value) {
            <span class="picker__card-check" aria-hidden="true">
              <lucide-icon name="check" [size]="9"></lucide-icon>
            </span>
          }
          <span class="picker__card-preview" aria-hidden="true">
            @switch (option.value) {
              @case ('classic')   { <lba-cv-mini-preview-classic /> }
              @case ('modern')    { <lba-cv-mini-preview-modern /> }
              @case ('editorial') { <lba-cv-mini-preview-editorial /> }
              @case ('minimal')   { <lba-cv-mini-preview-minimal /> }
              @case ('executive') { <lba-cv-mini-preview-executive /> }
            }
          </span>
          <span class="picker__card-name">{{ option.label }}</span>
        </button>
      }
    </div>
  }
</div>
