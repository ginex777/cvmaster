<div class="picker" role="group" aria-label="CV-Template auswahlen">
  @for (option of options; track option.value) {
    <button
      type="button"
      class="picker__button"
      [class.picker__button--active]="template() === option.value"
      [attr.aria-pressed]="template() === option.value"
      [attr.aria-label]="'Template: ' + option.label"
      (click)="templateChange.emit(option.value)">
      {{ option.label }}
    </button>
  }
</div>
