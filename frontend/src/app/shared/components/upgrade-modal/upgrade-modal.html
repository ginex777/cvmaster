@if (open()) {
  <div class="modal" role="presentation" (click)="dismissed.emit()">
    <section
      class="modal__dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="upgrade-title"
      aria-describedby="upgrade-body"
      (click)="$event.stopPropagation()">

      <div class="modal__glow" aria-hidden="true"></div>

      <div class="modal__sparkles" aria-hidden="true">
        <lucide-icon name="sparkles" [size]="28"></lucide-icon>
      </div>

      <p class="modal__eyebrow">Pro</p>
      <h2 id="upgrade-title">Hol das Beste aus deinen Bewerbungen</h2>
      <p id="upgrade-body">Upgrade auf Pro und bewirb dich öfter, schneller und erfolgreicher.</p>

      <ul class="modal__features" aria-label="Pro-Features">
        <li>
          <lucide-icon name="check" [size]="15" aria-hidden="true"></lucide-icon>
          Unbegrenzte Bewerbungen optimieren
        </li>
        <li>
          <lucide-icon name="check" [size]="15" aria-hidden="true"></lucide-icon>
          KI-Anschreiben für jede Stelle
        </li>
        <li>
          <lucide-icon name="check" [size]="15" aria-hidden="true"></lucide-icon>
          ATS-Score & Keyword-Analyse
        </li>
        <li>
          <lucide-icon name="check" [size]="15" aria-hidden="true"></lucide-icon>
          Erinnerungen & Pipeline-Tracker
        </li>
      </ul>

      <button type="button" class="btn btn--cta btn--lg modal__cta" (click)="upgradeRequested.emit()">
        Pro starten — 9,99 EUR / Monat
      </button>

      <button type="button" class="modal__dismiss" (click)="dismissed.emit()">Vielleicht später</button>
    </section>
  </div>
}
