<span
  class="pill"
  [class.pill--md]="size() === 'md'"
  [style.color]="meta().color"
  [style.background]="meta().bg"
  [attr.aria-label]="'Status: ' + meta().label"
  [attr.data-status]="status()"
  role="status"
>
  <span class="pill__dot" [style.background]="meta().color" aria-hidden="true"></span>
  {{ meta().label }}
</span>
