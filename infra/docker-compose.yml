services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lba
      POSTGRES_USER: lba
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-postgres-password}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "lba"]
      interval: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-local-redis-password}
    volumes:
      - redis_data:/data

  api:
    build: ../backend
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://lba:local-postgres-password@postgres:5432/lba}
      REDIS_URL: ${REDIS_URL:-redis://:local-redis-password@redis:6379}
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-change-me}
      IP_SALT: ${IP_SALT:-local-dev-ip-salt-change-me}
      APP_URL: ${APP_URL:-http://localhost}
      MAIL_DOMAIN: ${MAIL_DOMAIN:-localhost}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }

  worker:
    build: ../backend
    profiles: ["worker"]
    command: node dist/worker.js
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://lba:local-postgres-password@postgres:5432/lba}
      REDIS_URL: ${REDIS_URL:-redis://:local-redis-password@redis:6379}
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-change-me}
      IP_SALT: ${IP_SALT:-local-dev-ip-salt-change-me}
      APP_URL: ${APP_URL:-http://localhost}
      MAIL_DOMAIN: ${MAIL_DOMAIN:-localhost}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      - postgres
      - redis

  frontend:
    build: ../frontend
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  caddy_data:
  caddy_config:
